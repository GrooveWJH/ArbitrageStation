name: Backend CI

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "backend/requirements.txt"

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install ruff

      - name: Enforce Python Line Limit
        run: python backend/tools/check_line_limit.py --root backend --max-lines 400 --exceptions-file backend/tools/line_limit_exceptions.txt

      - name: Enforce No Loader Pattern
        run: python backend/tools/check_no_loader.py --root backend

      - name: Enforce No Split Aggregator Pattern
        run: python backend/tools/check_no_split_aggregator.py --root backend

      - name: Enforce Layer Boundaries
        run: python backend/tools/check_layer_boundaries.py --root backend

      - name: Enforce No Legacy Api Imports
        run: python backend/tools/check_no_legacy_api_imports.py --root backend

      - name: Lint Backend With Ruff
        run: ruff check backend --config backend/ruff.toml

      - name: Compile Backend
        run: python -m compileall -q backend

      - name: Run Backend Test Suite
        run: python -m unittest discover -s backend/tests -p "test_*.py" -v
